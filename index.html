<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prof Exam Prep - Embryology</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Using the provided bear illustration as the overall background */
            background-image: url('image_0.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #2c3e50;
        }
        #game-container, #sorry-page {
            /* White background with high transparency to see the bear illustration through it */
            background: rgba(255, 255, 255, 0.85); 
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(100, 200, 150, 0.1); /* Very light shadow */
            text-align: center;
            max-width: 500px;
            width: 90%;
            /* Border and accents in a much lighter, softer sea green */
            border-top: 10px solid #a4e7cc; /* Lighter Sea Green */
        }
        #sorry-page { display: none; }
        img.inner-photo {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 3px solid #d1e2da;
        }
        input {
            padding: 12px;
            width: 85%;
            border: 2px solid #cbdadb;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.8); /* Semi-transparent input */
        }
        /* Input focus also in a lighter sea green */
        input:focus { border-color: #a4e7cc; }
        button {
            padding: 12px 25px;
            /* Lighter Sea Green button */
            background-color: #a4e7cc; 
            border: none;
            border-radius: 8px;
            color: #4a4a4a; /* Darker text for contrast on a lighter background */
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #88d4b3; /* Slightly darker lighter sea green on hover */
            transform: scale(1.02); 
        }
        /* Viva Level title in the new lighter sea green */
        h2.viva-title {
            color: #a4e7cc;
            margin-top: 0;
        }
        .hint { font-size: 1rem; color: #556b2f; margin-bottom: 20px; line-height: 1.5; font-weight: 500; }
        .sub-hint { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 10px; display: block; }
        #error-msg { color: #c0392b; font-size: 0.9rem; margin-top: 15px; font-weight: bold; white-space: pre-line; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2 id="level-title" class="viva-title">Quest 1/10</h2>
        <span id="topic-label" class="sub-hint">Topic: Third Week of Development</span>
        <p id="hint-text" class="hint">The process characterized by the formation of the Primitive Streak and three germ layers.</p>
        <input type="text" id="password-input" placeholder="Password" autocomplete="off">
        <br>
        <button onclick="checkAnswer()">Submit to Mr. Y</button>
        <p id="error-msg" style="display: none;"></p>
    </div>

    <div id="sorry-page">
        <h2>VGSFHJ</h2>
        <img src="your-image-here.jpg" alt="A message for you" class="inner-photo">
        <p style="line-height: 1.6;">
            arekbar ki dewa jay mon valo korar sujog?
            if yes, then press the button below
            Vul Gulo Sob Ful Hoye Jak...
        </p>
        <br>
        <button onclick="window.location.href='https://youtu.be/ZKdeysFdLTQ'">VGSFHJ💝 </button>
    </div>

    <script>
        const challenges = [
            { topic: "Third Week of Development", hint: "The process characterized by the formation of the Primitive Streak and three germ layers.", ans: "gastrulation", chapter: "Chapter 5" },
            { topic: "First Week of Development", hint: "The 16-cell stage formed approximately 3 days after fertilization.", ans: "morula", chapter: "Chapter 3" },
            { topic: "Molecular Regulation", hint: "The 'Master Gene' responsible for establishing left-right sidedness (asymmetry).", ans: "pitx2", chapter: "Chapter 5" },
            { topic: "Third Week / Notochord", hint: "Remnant of the Notochord found in the adult intervertebral disc.", ans: "nucleus pulposus", chapter: "Chapter 5" },
            { topic: "Body Cavities", hint: "Clinical: Failure of the pleuroperitoneal membrane to close leads to Congenital ________ Hernia.", ans: "diaphragmatic", chapter: "Chapter 10" },
            { topic: "Second Week / Implantation", hint: "The structure that produces hCG to prevent the degeneration of the corpus luteum.", ans: "syncytiotrophoblast", chapter: "Chapter 4" },
            { topic: "Gametogenesis", hint: "A tumor formed from pluripotent cells, often containing hair, teeth, or bone.", ans: "teratoma", chapter: "Chapter 2" },
            { topic: "Head and Neck", hint: "The embryological origin of the Parafollicular (C) cells of the Thyroid gland.", ans: "ultimobranchial body", chapter: "Chapter 19" },
            { topic: "Central Nervous System", hint: "Clinical: The condition resulting from the failure of the Cranial Neuropore to close.", ans: "anencephaly", chapter: "Chapter 21" },
            { topic: "Third Week / Mesoderm", hint: "The specific portion of the mesoderm that forms the somites.", ans: "paraxial", chapter: "Chapter 5" }
        ];

        let currentLevel = 0;

        function checkAnswer() {
            const input = document.getElementById('password-input').value.toLowerCase().trim();
            const error = document.getElementById('error-msg');

            if (input === challenges[currentLevel].ans) {
                currentLevel++;
                error.style.display = 'none';
                document.getElementById('password-input').value = '';

                if (currentLevel < challenges.length) {
                    document.getElementById('level-title').innerText = `Prof Viva: Level ${currentLevel + 1}/10`;
                    document.getElementById('topic-label').innerText = `Topic: ${challenges[currentLevel].topic}`;
                    document.getElementById('hint-text').innerText = challenges[currentLevel].hint;
                } else {
                    document.getElementById('game-container').style.display = 'none';
                    document.getElementById('sorry-page').style.display = 'block';
                }
            } else {
                // Modified error message to only show the chapter number
                error.innerText = `Lung-man kaku bolechen wrong \nCheck 14th Ed, ${challenges[currentLevel].chapter}.`;
                error.style.display = 'block';
            }
        }

        document.getElementById("password-input").addEventListener("keyup", function(event) {
            if (event.key === "Enter") { checkAnswer(); }
        });
    </script>
</body>
</html>
